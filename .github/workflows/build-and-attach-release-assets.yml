name: Build And Attach Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve app version from release tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag -replace '^[vV]', ''
          if ($version -match '^\d+\.\d+\.\d+$') {
            $version = "$version.0"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Invalid tag format: '$tag'. Use format like v1.2.3 or v1.2.3.4"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish (Release, win-x64)
        run: dotnet publish .\PlustekBCR.csproj -c Release -p:PublishProfile=win-x64.pubxml -p:Version=${{ env.APP_VERSION }} -p:FileVersion=${{ env.APP_VERSION }} -p:AssemblyVersion=${{ env.APP_VERSION }}

      - name: Package publish folder
        shell: pwsh
        run: |
          $publishDir = "bin\Release\net8.0-windows10.0.19041.0\win-x64\publish"
          if (!(Test-Path $publishDir)) {
            throw "Publish directory not found: $publishDir"
          }
          $version = "${{ github.event.release.tag_name }}"
          $safeVersion = $version -replace '[^0-9A-Za-z\.\-_]', '_'
          $zipName = "PlustekBCR-$safeVersion-win-x64.zip"
          Compress-Archive -Path "$publishDir\*" -DestinationPath $zipName -Force
          "ZIP_PATH=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
