name: Publish Update Manifest

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Build And Attach Release Assets"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-manifest:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Build update.json from latest release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: release } = await github.rest.repos.getLatestRelease({ owner, repo });

            const assets = release.assets || [];
            const preferred = assets.find(a => /\.(exe|msix|msixbundle|zip)$/i.test(a.name));
            const fallback = assets[0];
            const asset = preferred || fallback;

            const downloadUrl = asset
              ? asset.browser_download_url
              : `https://github.com/${owner}/${repo}/releases/tag/${release.tag_name}`;

            const body = (release.body || "").trim();
            const notes = body.length > 0 ? body : `Release ${release.tag_name}`;

            const version = String(release.tag_name).replace(/^v/i, "");
            const manifest = {
              version,
              downloadUrl,
              notes
            };

            fs.writeFileSync("update.json", JSON.stringify(manifest, null, 2) + "\n");

      - name: Commit updated manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update update.json for ${{ github.event.release.tag_name }}"
          file_pattern: update.json
